name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Sync Pages
        run: |
          max_retries=60
          retry_delay=60
          for i in $(seq 1 $max_retries); do
            if curl -sf -X POST https://ltpp.vip/api/github/pages/sync/eastspire/kimi-mc \
              -H "Connection: close"; then
              echo ""
              echo "Sync succeeded on attempt $i"
              exit 0
            fi
            echo "Attempt $i of $max_retries failed"
            if [ $i -lt $max_retries ]; then
              echo "Retrying in ${retry_delay}s..."
              sleep $retry_delay
            fi
          done
          echo "All $max_retries attempts failed"
          exit 1
